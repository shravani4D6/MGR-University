<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | The Tamil Nadu Dr.M.G.R. Medical University</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <!-- Sidebar Branding -->
        <div class="auth-sidebar">
            <div class="auth-sidebar-content">
                <div class="mgr-logo">
                    <img src="images/logo.png" alt="Dr. M.G.R. Educational and Research Institute Logo" style="height: 55px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); background: white; padding: 5px; border-radius: 4px;">
                </div>
                <h1>Welcome Back</h1>
                <p>Log in to your admissions dashboard to track your application status, upload documents, and complete fee payments securely.</p>
            </div>
        </div>

        <!-- Login Form -->
        <div class="auth-main">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Student Portal Login</h2>
                    <p>Enter your credentials to access your account.</p>
                </div>

                <form action="dashboard.html" method="GET" id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Registered Email ID" required>
                        <i class="fas fa-envelope icon"></i>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <i class="fas fa-lock icon"></i>
                    </div>

                    <div style="text-align: right; margin-bottom: 24px;">
                        <a href="#" style="font-size: 13.5px; font-weight: 500;">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-primary">Login Securely <i class="fas fa-sign-in-alt" style="margin-left: 8px;"></i></button>
                </form>

                <div class="auth-footer">
                    <p>New applicant? <a href="signup.html" style="font-weight: 600;">Register here</a>.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>
</html>
